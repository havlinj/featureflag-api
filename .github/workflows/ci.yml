# CI: runs on every push to master and on pull requests targeting master.
# Runs check, unit tests, Go integration tests (testcontainers), build, binary smoke test,
# and bash integration tests (config/sad path). Requires Docker for testcontainers and smoke/integration scripts.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/integration/*.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check (gofmt, go vet)
        run: bash scripts/check.sh

      - name: Verify CI scripts are synced with test_all_full
        run: python3 scripts/github/verify_ci_sync.py

      - name: Unit tests
        run: bash scripts/test_unit.sh

      - name: Integration tests (Go, testcontainers)
        run: bash scripts/test_integration.sh

      - name: Coverage gate
        run: bash scripts/coverage/test_coverage.sh

      - name: Build binary
        run: bash scripts/build.sh

      - name: Binary smoke test
        run: bash scripts/test_binary_smoke.sh

  bash-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - scripts/integration/test_missing_jwt_secret.sh
          - scripts/integration/test_weak_jwt_secret.sh
          - scripts/integration/test_invalid_dsn.sh
          - scripts/integration/test_default_listen_addr.sh
          - scripts/integration/test_tls_config.sh
          - scripts/integration/test_invalid_tls_files.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/integration/*.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify CI scripts are synced with test_all_full
        run: python3 scripts/github/verify_ci_sync.py

      - name: Run bash integration test
        run: bash ${{ matrix.script }}
